repos:
  - repo: local
    hooks:
      - id: validate-sdd-change-packages
        name: Validate SDD change packages
        entry: python scripts/validate_change.py --staged
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: validate-operations-catalog
        name: Validate operation catalog derived views
        entry: python scripts/validate_operations_catalog.py --json
        language: system
        pass_filenames: false
        stages: [pre-commit]

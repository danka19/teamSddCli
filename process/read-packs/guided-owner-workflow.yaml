schema_version: '1.0'
id: guided-owner-workflow
purpose: Route a human or AI assistant from a declared business situation to catalog-backed
  read-only guidance.
canonical_sources:
- catalogs/operations.yaml
- catalogs/guided-owner-workflow.yaml
- ../../docs/runbooks/GUIDED_OWNER_WORKFLOW.md
assistant_may:
- explain a catalog-declared route
- identify missing facts
- draft non-canonical artifacts
- prepare a non-authoritative `decision_draft` for the shown change and revision
- present a discovery map and explicit default/defer choices
assistant_must_not:
- select an undocumented route
- confirm classification or a gate
- approve waiver, resume, release, archive, merge, or deployment
- invoke a mutating command
- record a decision from `Да`, `продолжай`, silence, or another ambiguous message
- treat `sdd request` or an operation-confirmation request as trusted operation authority
stop_when:
- a required fact is absent
- a human decision is named
- a decision card awaits its next trusted confirmation
- trusted operation-event metadata is unavailable or does not validate
- a material discovery area remains unresolved
- an unavailable surface requires deterministic fallback

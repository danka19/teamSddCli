schema_version: "1.1"
catalog_id: guided-owner-workflow
routes:
  - id: new-requirement
    situation: new-requirement
    required_facts:
      - classification
    allowed_values:
      classification: [minor, major, hotfix]
    commands:
      - create-change
      - classify-change
    evidence:
      - proposed change package
      - classification evidence
    human_decision:
      id: classification-confirmation
      owner: Tech Lead
      consequence: Classification remains pending and no gate is approved.
    fallbacks:
      - surface: model-runtime
        command: manual-fallback --unavailable model-runtime
  - id: existing-change
    situation: existing-change
    required_facts:
      - change_id
      - lifecycle_state
    allowed_values:
      lifecycle_state: [draft, spec_review, approved, in_implementation, ready_to_archive, archived]
    commands:
      - prepare-spec-pr
      - evaluate-change-gates
      - prepare-archive
    evidence:
      - change identity
      - lifecycle and gate evidence
    human_decision:
      id: applicable-gate-decision
      owner: Analyst
      consequence: The change remains at its recorded state.
    fallbacks: []
  - id: urgent-incident
    situation: urgent-incident
    required_facts:
      - incident_ref
    commands:
      - classify-change
      - create-change
      - evaluate-change-gates
    evidence:
      - incident reference
      - minimum regression and reconciliation evidence
    human_decision:
      id: hotfix-eligibility-confirmation
      owner: Tech Lead
      consequence: The work stays held; urgency does not bypass safety gates.
    fallbacks:
      - surface: model-runtime
        command: manual-fallback --unavailable model-runtime
  - id: blocked-operation
    situation: blocked-operation
    required_facts:
      - failed_run_ref
    commands:
      - manual-fallback
    evidence:
      - retained failed-run evidence
      - hold or escalation record
    human_decision:
      id: hold-or-resume-decision
      owner: Tech Lead
      consequence: Work remains held until an accountable human records a decision.
    fallbacks:
      - surface: model-runtime
        command: manual-fallback --unavailable model-runtime

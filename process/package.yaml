schema_version: "1.1"
package:
  id: sdd-process
  version: 0.2.0
openspec:
  cli_version: 1.4.1
workflow: workflow.yaml
policies: policies/manifest.yaml
schemas:
  process_package: schemas/process-package.schema.json
  workflow: schemas/workflow.schema.json
  sdd_config: schemas/sdd-config.schema.json
  projects: schemas/projects.schema.json
  owners: schemas/owners.schema.json
  project_adapter: schemas/project-adapter.schema.json
  reference: schemas/reference.schema.json
  release_manifest: schemas/release-manifest.schema.json
  change_v2: schemas/change-v2.schema.json
  policy_manifest: schemas/policy-manifest.schema.json
  policy_document: schemas/policy-document.schema.json
  gate_evaluation_input: schemas/gate-evaluation-input.schema.json
  tech_lead_review_input: schemas/tech-lead-review-input.schema.json
  tech_lead_control_record: schemas/tech-lead-control-record.schema.json
  corporate_flow_input: schemas/corporate-flow-input.schema.json
  traceability_v2: schemas/traceability-v2.schema.json
  external_mapping: schemas/external-mapping.schema.json
  operation_evidence: schemas/operation-evidence.schema.json
  read_pack_request: schemas/read-pack-request.schema.json
  task_launch: schemas/task-launch.schema.json
  read_pack: schemas/read-pack.schema.json
  weak_model_operation_evidence: schemas/weak-model-operation-evidence.schema.json
  parallel_plan: schemas/parallel-plan.schema.json
  certification_case: schemas/certification-case.schema.json
  certification_evidence: schemas/certification-evidence.schema.json
  coverage_report: schemas/coverage-report.schema.json
templates:
  change_v2: templates/change-v2/change.yaml
  change_package: templates/change/change.yaml
examples:
  classification:
    - examples/classification/minor.yaml
    - examples/classification/major.yaml
    - examples/classification/hotfix.yaml
read_packs:
  classification: read-packs/classification.yaml
role_instructions:
  analyst: roles/analyst.md
  developer: roles/developer.md
  qa: roles/qa.md
  tech_lead: roles/tech-lead.md
adapters:
  qwen_class: adapters/qwen-class.yaml
  deepseek_class: adapters/deepseek-class.yaml
  gigacode_class: adapters/gigacode-class.yaml
certification:
  case_catalog: certification/cases.yaml
  coverage_inventory: certification/coverage.yaml
distribution:
  files:
    - VERSION
    - __init__.py
    - certification.py
    - operation_cli.py
    - package.yaml
    - weak_model_kit.py
    - workflow.yaml
    - workflow_operations.py
  roots:
    - adapters
    - certification
    - examples
    - policies
    - read-packs
    - roles
    - schemas
    - templates
    - validators
canonical_sources:
  - openspec/specs/repo-topology-config/spec.md
  - openspec/changes/define-transfer-ready-process-package/specs/transfer-readiness/spec.md
  - openspec/changes/define-transfer-ready-process-package/specs/weak-model-guardrails/spec.md
  - openspec/changes/adopt-nis-corporate-process-governance/specs/corporate-change-classification/spec.md
  - openspec/changes/adopt-nis-corporate-process-governance/specs/tech-lead-workflow/spec.md
  - openspec/changes/adopt-nis-corporate-process-governance/specs/corporate-flow-controls/spec.md

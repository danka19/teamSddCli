schema_version: "1.0"
policy_id: pilot-safety
version: 1.0.0
kind: pilot-safety
canonical_sources:
  - openspec/changes/adopt-nis-corporate-process-governance/specs/corporate-flow-controls/spec.md
rules:
  - id: pilot.ai-authority-boundary
    override_mode: locked
    value: advisory-only
  - id: pilot.minimum-risk-controls
    override_mode: additive
    value_type: id-list
    value:
      - data-privacy
      - secrets
      - access
      - accidental-delivery
      - rollback-or-hold
      - adapters-and-mcps
      - model-runtime-behavior
      - logging
      - external-dependencies
      - support-ownership
      - evidence-corruption
      - process-bypass
  - id: pilot.ai-disabled-core-required
    override_mode: locked
    value: true

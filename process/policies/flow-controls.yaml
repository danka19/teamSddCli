schema_version: "1.0"
policy_id: flow-controls
version: 1.0.0
kind: flow-controls
canonical_sources:
  - openspec/changes/adopt-nis-corporate-process-governance/specs/corporate-flow-controls/spec.md
rules:
  - id: flow.production-stop-triggers
    override_mode: locked
    value:
      - required-context-missing-or-contradictory
      - material-scope-drift-unassessed
      - required-verification-unavailable
      - critical-defect-unresolved
      - security-compliance-access-policy-violation
      - unauthorized-data-or-output-leakage-risk
      - mandatory-evidence-collection-failure
      - owner-authority-conflict
      - rollback-or-hold-unavailable
      - canonical-evidence-corruption
      - approved-safety-authority-exceeded
  - id: flow.rollback-or-hold-required
    override_mode: locked
    value: true
  - id: flow.additional-stop-triggers
    override_mode: additive
    value_type: id-list
    value: []

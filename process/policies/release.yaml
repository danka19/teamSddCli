schema_version: "1.0"
policy_id: release
version: 1.0.0
kind: release
canonical_sources:
  - openspec/changes/adopt-nis-corporate-process-governance/specs/change-lifecycle/spec.md
  - openspec/changes/adopt-nis-corporate-process-governance/specs/readiness-completion-gates/spec.md
  - openspec/changes/adopt-nis-corporate-process-governance/specs/corporate-flow-controls/spec.md
rules:
  - id: release.distinct-states
    override_mode: locked
    value:
      - implementation-complete
      - definition-of-done
      - release-ready
      - archive-ready
      - archived
      - delivered
  - id: release.final-archive-human-approval
    override_mode: locked
    value: true
  - id: release.hotfix-reconciliation
    override_mode: locked
    value: true
  - id: release.package-minimums
    override_mode: locked
    value:
      - artifact-version
      - included-changes
      - requirements-scenarios
      - verification-evidence
      - known-limitations
      - configuration-assumptions
      - installation-transfer-steps
      - rollback-or-hold
      - operations-support-contacts
      - unresolved-follow-ups
  - id: release.lifecycle-states
    override_mode: locked
    value: [draft, spec_review, approved, in_implementation, ready_to_archive, archived]
  - id: release.forward-transitions
    override_mode: locked
    value:
      draft: [spec_review]
      spec_review: [draft, approved]
      approved: [in_implementation]
      in_implementation: [ready_to_archive]
      ready_to_archive: [in_implementation, archived]
      archived: []
  - id: release.transition-gates
    override_mode: locked
    value:
      draft->spec_review: [review-ready]
      spec_review->draft: []
      spec_review->approved: [definition-of-ready]
      approved->in_implementation: [implementation-start-approval]
      in_implementation->ready_to_archive: [implementation-complete, definition-of-done, release-transfer-readiness]
      ready_to_archive->in_implementation: []
      ready_to_archive->archived: [archive-readiness, archive-approval]
  - id: release.external-state-non-inference
    override_mode: locked
    value: [delivered, deployed, tracker-done]
